services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: career_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://career:password@db:5432/portfolio_db
      QDRANT_URL: http://qdrant:6333
      BASE_URL: http://localhost:8000
      MEDIA_DIR: media
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: career_db
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: career
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: career_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
